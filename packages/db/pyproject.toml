[project]
name = "voyager-db"
version = "0.1.0"
description = "Postgres schema, SQLModel models, and Alembic migrations for Voyager."
requires-python = ">=3.12"
dependencies = [
    "sqlmodel>=0.0.22",
    "alembic>=1.13",
    "psycopg[binary]>=3.2",
    "python-dotenv>=1.0",
    "sqlalchemy>=2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["voyager_db"]
