[project]
name = "voyager-common"
version = "0.1.0"
description = "Shared configuration / KV secret loader for Voyager services."
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.8",
    "pydantic-settings>=2.5",
    "azure-identity>=1.19",
    "azure-keyvault-secrets>=4.8",
]

[dependency-groups]
dev = [
    "pytest>=8.3",
    "pytest-mock>=3.14",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["voyager_common"]
