[project]
name = "voyager-agents"
version = "0.1.0"
description = "LangGraph agent graphs for Voyager (Eric: overseas growth marketing)."
requires-python = ">=3.12"
dependencies = [
    "langgraph>=0.2.40",
    "langchain-core>=0.3",
    "pydantic>=2.8",
    "structlog>=24.4",
    "langfuse>=2.50",
    "voyager-tools",
    "voyager-db",
]

[dependency-groups]
dev = [
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "pytest-mock>=3.14",
]

[tool.uv.sources]
voyager-tools = { workspace = true }
voyager-db = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["voyager_agents"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
