[project]
name = "voyager-evals"
version = "0.1.0"
description = "Evaluation harnesses for Voyager agents (Eric, Mike, Dana)."
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.8",
    "pyyaml>=6.0",
    "sentence-transformers>=3.0",
    "json-repair>=0.30",
    "voyager-agents",
    "voyager-tools",
]

[dependency-groups]
dev = [
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
]

[tool.uv.sources]
voyager-agents = { workspace = true }
voyager-tools = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["voyager_evals"]
