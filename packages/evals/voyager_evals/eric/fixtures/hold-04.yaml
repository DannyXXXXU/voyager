gold_hooks:
- text: They perform during the day, tear down the stage at night, then travel overnight
    to the next location and the next day they perform again, sometimes working non-stop
    for 36 hours.
  aliases:
  - Perform by day, dismantle at night, travel overnight to new venues, and perform
    again - sometimes 36 hours straight.
  - 'Their schedule: daytime performances, nighttime teardowns, overnight travel,
    then perform again, occasionally for 36 hours non-stop.'
  - Day performances, night teardowns, overnight relocations, next-day shows - a grueling
    cycle that can last 36 hours without rest.
  timestamp_s: 15.0
- text: And what's even more unbelievable is that there are no tickets, anyone can
    watch for free. So how do they survive?
  aliases:
  - 'Even more incredible: no tickets exist, everyone watches free. How do they make
    it work?'
  - What's more amazing is admission is completely free for anyone. How do they sustain
    themselves?
  - The most surprising part? All performances are free with no tickets. So how do
    they stay afloat?
  timestamp_s: 30.0
- text: Back in the 1930s, Charlie Chaplin visited China and watched traditional Chinese
    opera, what you are seeing today looks almost the same as what he saw nearly 100
    years ago.
  aliases:
  - Charlie Chaplin saw Chinese opera in the 1930s, and today's performances remain
    nearly identical to what he witnessed 100 years ago.
  - What you're watching today is almost unchanged from the traditional Chinese opera
    Charlie Chaplin attended in China during the 1930s, nearly a century ago.
  - In the 1930s, Charlie Chaplin watched this art form in China; nearly 100 years
    later, it looks virtually the same.
  timestamp_s: 120.0
- text: This troupe has built a following of nearly 1 million on the Chinese version
    of TikTok.
  aliases:
  - The troupe has amassed close to 1 million followers on Chinese TikTok.
  - Nearly 1 million people follow this opera company on China's TikTok platform.
  - On the Chinese TikTok, this group has gained a following approaching 1 million.
  timestamp_s: 280.0
- text: When I asked her about those years during the COVID-19 pandemic... the hardship
    and struggles of a private opera troupe are not only the reality, but all the
    difficulties they've faced are fully revealed.
  aliases:
  - Asking her about the COVID-19 pandemic years revealed the full scope of hardship
    and struggle this private opera troupe faced.
  - Her account of the pandemic period exposed not just the reality but all the difficulties
    confronting a private opera troupe.
  - When discussing the COVID-19 years, she unveiled the complete challenges and struggles
    this private troupe has endured.
  timestamp_s: 350.0
- text: A mother walks on stage to perform while others backstage help take care of
    her baby.
  aliases:
  - While a mother performs onstage, her baby is cared for by others behind the scenes.
  - A performing mother takes the stage as backstage crew members watch her infant.
  - She performs while fellow troupe members look after her baby backstage.
  timestamp_s: 380.0
- text: What is left behind is a ground covered in trash, creating a striking and
    overwhelming scene.
  aliases:
  - 'The aftermath: a trash-covered ground creating an overwhelming and striking sight.'
  - Left behind is a debris-strewn landscape, a striking and overwhelming spectacle.
  - What remains is trash blanketing the ground, making for a powerfully striking
    scene.
  timestamp_s: 480.0
- text: Every time they arrive at a new destination, it feels like a game of chance.
    If they are lucky, they can stay in an abandoned house. If not, they have no choice
    but to set up tents and sleep outdoors.
  aliases:
  - Each arrival at a new location is uncertain - lucky means an abandoned house,
    unlucky means tents and sleeping outside.
  - 'Reaching a new destination is always a gamble: good fortune brings abandoned
    shelter, bad luck means outdoor tents.'
  - At every new stop, it's chance whether they find an abandoned house or must pitch
    tents and sleep outdoors.
