gold_hooks:
- text: If you're traveling to China for the first time, there are a few things you
    need to know, and it's best to be prepared so you have a smooth journey.
  aliases:
  - First-time visitors to China should know a few key things and prepare in advance
    for a seamless trip.
  - Heading to China for the first time? Here are essential things to be aware of
    to ensure your journey goes smoothly.
  - A few important preparations will help first-time China travelers have a smooth
    and hassle-free experience.
  timestamp_s: 0.0
- text: Booking a hotel in China can be a little tricky, as not every hotel is allowed
    to host foreign nationals.
  aliases:
  - Hotels in China have restrictions—not all are permitted to accommodate foreign
    guests.
  - Finding accommodation in China is tricky since only certain hotels can legally
    host foreign nationals.
  - Not every Chinese hotel is authorized to accept foreign guests, making reservations
    somewhat challenging.
  timestamp_s: 45.0
- text: You'll need to register at the police station nearest to the place that you're
    staying within 24 hours of arriving here in Shanghai.
  aliases:
  - Within 24 hours of arrival in Shanghai, you must register with the local police
    station near your accommodation.
  - Registration at the nearest police station is required within 24 hours of arriving
    at your Shanghai lodging.
  - You're required to visit the police station closest to your Shanghai residence
    within 24 hours of arrival to register.
  timestamp_s: 90.0
- text: Naturally, your phone doesn't work. You've got no cellular service and no
    Wi-Fi.
  aliases:
  - Of course, your phone won't work—no cellular signal, no Wi-Fi connection.
  - 'Your phone is useless here: no mobile data and no wireless internet.'
  - Obviously, there's no phone service available—neither cellular nor Wi-Fi.
  timestamp_s: 120.0
- text: Paying for things in China is a little bit different than other countries.
    Cash is seldom used, especially in the big cities.
  aliases:
  - Payment methods in China differ from elsewhere. Cash is rarely accepted, particularly
    in major cities.
  - China handles payments differently—cash is hardly ever used, especially in large
    urban areas.
  - Unlike other countries, China rarely uses physical cash for transactions, mainly
    in metropolitan areas.
  timestamp_s: 240.0
- text: Most of them, if not all of them, require a reservation. Whether there's a
    ticket price or not, you still need to make a reservation.
  aliases:
  - Nearly all attractions require advance reservations, regardless of whether admission
    is free or paid.
  - Reservations are mandatory for virtually every site, whether or not there's an
    entry fee.
  - Almost every venue needs booking ahead of time—free or ticketed, you must reserve.
  timestamp_s: 420.0
- text: Here's a problem. Everything is in Chinese. There's no other language. There's
    no English here.
  aliases:
  - 'The issue is simple: everything''s written in Chinese. No English or other languages
    available.'
  - This is the challenge—all signage is Chinese-only, with no English translations
    present.
  - 'There''s a difficulty: Chinese is the only language used here, with no English
    option.'
  timestamp_s: 480.0
