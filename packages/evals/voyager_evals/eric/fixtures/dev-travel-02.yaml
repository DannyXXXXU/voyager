gold_selling_points:
- text: See the real-life inspiration for Avatar's floating mountains - towering quartz
    sandstone pillars that are officially named the Hallelujah Mountains
  aliases: []
- text: Explore 5 diverse sections of the park including Yuanjiajie (Avatar Mountains),
    Yangjiajie, Tianzi Mountain, Huangshi Village, and Golden Whip Stream
  aliases: []
- text: Experience the record-breaking Bailong Elevator - a dramatic double-decker
    glass elevator ride up the mountainside
  aliases: []
- text: Very affordable visit with ticket deals as low as 210 yuan for entrance and
    248 yuan for unlimited cable car rides across 4 days
  aliases: []
- text: Find peace and quiet despite 20,000 daily visitors due to the park's massive
    size
  aliases: []
- text: Inexpensive food options throughout the park with authentic Chinese street
    food
  aliases: []
- text: See wildlife up close with hundreds of monkeys throughout the park, especially
    at Huangshi Village and Golden Whip Stream
  aliases: []
- text: Walk across the First Bridge Under Heaven - a natural bridge 350 meters above
    the ground with stunning archway views
  aliases: []
- text: Enjoy scenic cable car rides with 15-minute journeys offering incredible mountain
    views from above
  aliases: []
- text: Convenient transportation with included shuttle buses and facial recognition
    entry (no need to carry tickets)
  aliases: []
- text: Experience the peaceful 2-hour Golden Whip Stream walk along the base of soaring
    towers with stream sounds and fewer crowds
  aliases: []
