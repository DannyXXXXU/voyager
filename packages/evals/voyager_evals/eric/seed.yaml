# Eric eval seed videos — 20 total (15 dev + 5 holdout)
#
# Structure per entry:
#   id          : stable short id used across fixtures (e.g. dev-food-01)
#   video_id    : YouTube 11-char id. Fill in before running scripts/prefetch_gold.py
#   topic       : free-text summary for humans
#   content_type: food | vlog | travel | culture | history | nature
#   difficulty  : easy | medium | hard   (easy=single topic / clear hooks, hard=long / abstract / multi-topic)
#   holdout     : true  → used ONLY for final pass/fail gate, never iterated on
#                 false → dev set; agent may over-tune against it
#   notes       : optional reviewer notes
#
# Selection guidance (Danny to curate):
#   - Cover Chengdu / Xinjiang / Yunnan / Beijing / Guangzhou / Harbin at minimum
#   - Mix big YouTubers (serpentza, laowhy86, blondie in china, lexie alford) with mid-tier
#   - Include 2-3 long-form (20min+) hard cases — Eric struggles most there
#   - Holdout must be UNSEEN during P0/P1 iteration; lock them day-1

