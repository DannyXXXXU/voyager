agent: eric
required_pass_rate: 0.80         # dev fixtures: 8 of 10 runs must pass
holdout_required_pass_rate: 1.0  # 5 holdout must be 100%
cost_budget_usd: 0.50
wall_clock_cap_seconds: 900
# Cosine similarity threshold for hook/selling-point semantic matching (MiniLM-L6).
# Dev is relaxed (iteration); holdout stays strict (real generalization gate).
# Rationale: histogram diagnosis (scripts/diag_p0_9_histogram.py) shows ~20% of
# unmatched gold items sit in the 0.65–0.75 near-miss band — these are valid
# paraphrases the metric rejects, not agent failures.
match_cosine_threshold:
  dev: 0.65
  holdout: 0.75
metrics:
  hook_extraction_f1:
    threshold:
      dev: 0.55       # relaxed: gold has incomplete hook coverage; P1 over-extracts valid hooks (e.g. "established in 1923") that aren't in gold
      holdout: 0.75   # strict: real generalization gate
    type: deterministic
    weight: 2
  selling_point_recall:
    threshold: 0.70
    type: deterministic
    weight: 2
  schema_validity_rate:
    threshold: 0.99
    type: deterministic
    weight: 1
  strategy_brief_quality:
    threshold: 4.0
    type: llm_judge
    judge_model: copilot-gpt-5
    rubric: judges/brief_rubric.md
    median_of: 3
    weight: 2
