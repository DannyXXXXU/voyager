[project]
name = "voyager-tools"
version = "0.1.0"
description = "Cloud-worker tool modules for Voyager: YouTube search, audio download, Whisper transcription, comments fetch."
requires-python = ">=3.12"
dependencies = [
    "google-api-python-client>=2.140",
    "yt-dlp>=2024.8.6",
    "openai>=1.40",
    "httpx>=0.27",
    "pydantic>=2.8",
    "tenacity>=9.0",
    "azure-servicebus>=7.12",
    "apify-client>=2.5.0",
]

[dependency-groups]
dev = [
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "pytest-mock>=3.14",
    "respx>=0.21",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["voyager_tools"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
